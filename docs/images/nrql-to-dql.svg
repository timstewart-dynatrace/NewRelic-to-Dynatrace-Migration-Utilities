<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">NRQL → DQL Compiler Pipeline</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">292 tested patterns · Phase 19 confidence uplift · 24 auto-fix rules</text>

  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- Stage boxes — horizontal pipeline -->
  <!-- 1. Input -->
  <rect x="30" y="100" width="120" height="80" rx="10" fill="#1E293B" stroke="#1CE783" stroke-width="2"/>
  <text x="90" y="135" text-anchor="middle" fill="#1CE783" font-size="13" font-weight="700">NRQL</text>
  <text x="90" y="158" text-anchor="middle" fill="#94A3B8" font-size="10">Raw query string</text>

  <line x1="155" y1="140" x2="175" y2="140" stroke="#A78BFA" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 2. Shorthands -->
  <rect x="180" y="100" width="100" height="80" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="230" y="130" text-anchor="middle" fill="#DDD6FE" font-size="12" font-weight="700">Shorthands</text>
  <text x="230" y="150" text-anchor="middle" fill="#94A3B8" font-size="10">9 NR aliases</text>
  <text x="230" y="165" text-anchor="middle" fill="#94A3B8" font-size="10">apdexScore →</text>
  <text x="230" y="178" text-anchor="middle" fill="#94A3B8" font-size="10">apdex(duration)</text>

  <line x1="285" y1="140" x2="305" y2="140" stroke="#A78BFA" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 3. Lexer -->
  <rect x="310" y="100" width="90" height="80" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="355" y="130" text-anchor="middle" fill="#DDD6FE" font-size="12" font-weight="700">Lexer</text>
  <text x="355" y="150" text-anchor="middle" fill="#94A3B8" font-size="10">Tokenize</text>
  <text x="355" y="165" text-anchor="middle" fill="#94A3B8" font-size="10">SELECT, FROM,</text>
  <text x="355" y="178" text-anchor="middle" fill="#94A3B8" font-size="10">WHERE, FACET...</text>

  <line x1="405" y1="140" x2="425" y2="140" stroke="#A78BFA" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 4. Parser -->
  <rect x="430" y="100" width="90" height="80" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="475" y="130" text-anchor="middle" fill="#DDD6FE" font-size="12" font-weight="700">Parser</text>
  <text x="475" y="150" text-anchor="middle" fill="#94A3B8" font-size="10">Recursive descent</text>
  <text x="475" y="165" text-anchor="middle" fill="#94A3B8" font-size="10">→ 18 AST node</text>
  <text x="475" y="178" text-anchor="middle" fill="#94A3B8" font-size="10">types</text>

  <line x1="525" y1="140" x2="545" y2="140" stroke="#A78BFA" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 5. AST / Emitter -->
  <rect x="550" y="100" width="120" height="80" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="610" y="130" text-anchor="middle" fill="#DDD6FE" font-size="12" font-weight="700">DQL Emitter</text>
  <text x="610" y="150" text-anchor="middle" fill="#94A3B8" font-size="10">K8s overrides</text>
  <text x="610" y="165" text-anchor="middle" fill="#94A3B8" font-size="10">Entity-field map</text>
  <text x="610" y="178" text-anchor="middle" fill="#94A3B8" font-size="10">Metric resolver</text>

  <line x1="675" y1="140" x2="695" y2="140" stroke="#A78BFA" stroke-width="2" marker-end="url(#a2)"/>

  <!-- 6. Output -->
  <rect x="700" y="100" width="200" height="80" rx="10" fill="#1E293B" stroke="#73BE28" stroke-width="2"/>
  <text x="800" y="130" text-anchor="middle" fill="#73BE28" font-size="13" font-weight="700">DQL</text>
  <text x="800" y="150" text-anchor="middle" fill="#86EFAC" font-size="10">fetch spans | filter ...</text>
  <text x="800" y="165" text-anchor="middle" fill="#86EFAC" font-size="10">timeseries avg(...)</text>
  <text x="800" y="178" text-anchor="middle" fill="#94A3B8" font-size="10">+ confidence HIGH/MED/LOW</text>

  <!-- Post-processing box -->
  <rect x="180" y="220" width="560" height="110" rx="12" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="460" y="248" text-anchor="middle" fill="#22D3EE" font-size="14" font-weight="700">Post-AST Processing</text>
  <line x1="200" y1="260" x2="720" y2="260" stroke="#334155" stroke-width="1"/>

  <text x="290" y="282" text-anchor="middle" fill="#A5F3FC" font-size="11">COMPARE WITH → shift:</text>
  <text x="460" y="282" text-anchor="middle" fill="#A5F3FC" font-size="11">EXTRAPOLATE handling</text>
  <text x="630" y="282" text-anchor="middle" fill="#A5F3FC" font-size="11">Apdex → countIf buckets</text>
  <text x="290" y="302" text-anchor="middle" fill="#A5F3FC" font-size="11">rate() interval preserve</text>
  <text x="460" y="302" text-anchor="middle" fill="#A5F3FC" font-size="11">percentage() decompose</text>
  <text x="630" y="302" text-anchor="middle" fill="#A5F3FC" font-size="11">Phase 19 confidence uplift</text>
  <text x="460" y="322" text-anchor="middle" fill="#94A3B8" font-size="10">MetricTransform plugin hook · Numeric score sync</text>

  <!-- Validator box -->
  <rect x="180" y="360" width="560" height="60" rx="12" fill="#1E293B" stroke="#FFB800" stroke-width="1.5"/>
  <text x="460" y="388" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">DQL Validator + Auto-Fixer (24 rules)</text>
  <text x="460" y="408" text-anchor="middle" fill="#94A3B8" font-size="11">Quotes · Operators · NULL checks · LIKE → contains · Backticks · AS aliases · Subqueries · ...</text>

  <!-- Arrows from pipeline down to post-processing -->
  <line x1="460" y1="185" x2="460" y2="215" stroke="#22D3EE" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="460" y1="335" x2="460" y2="355" stroke="#FFB800" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- Footer -->
  <text x="465" y="455" text-anchor="middle" fill="#475569" font-size="11">compiler/ · 292 patterns · nrql-engine parity pinned in CI</text>
  <text x="465" y="475" text-anchor="middle" fill="#334155" font-size="10">Dynatrace-NewRelic v2.0.0</text>
</svg>
