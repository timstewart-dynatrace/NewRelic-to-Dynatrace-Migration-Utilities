<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Entity Mapping — NR → DT Gen3</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">What each New Relic entity becomes in Dynatrace</text>

  <!-- Headers -->
  <text x="220" y="100" text-anchor="middle" fill="#1CE783" font-size="14" font-weight="700">New Relic</text>
  <text x="710" y="100" text-anchor="middle" fill="#1496FF" font-size="14" font-weight="700">Dynatrace (Gen3)</text>

  <!-- Row template: NR box → arrow → DT box -->
  <!-- Row 1: Dashboard -->
  <rect x="60" y="120" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="140" text-anchor="middle" fill="#94A3B8" font-size="12">Dashboard (multi-page)</text>
  <line x1="385" y1="135" x2="545" y2="135" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="120" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="140" text-anchor="middle" fill="#86EFAC" font-size="12">Document API Dashboard (Grail)</text>

  <!-- Row 2: Alert Policy -->
  <rect x="60" y="160" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="180" text-anchor="middle" fill="#94A3B8" font-size="12">Alert Policy + NRQL Conditions</text>
  <line x1="385" y1="175" x2="545" y2="175" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="160" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="180" text-anchor="middle" fill="#86EFAC" font-size="12">Workflow + Davis Anomaly Detector</text>

  <!-- Row 3: Synthetic -->
  <rect x="60" y="200" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="220" text-anchor="middle" fill="#94A3B8" font-size="12">Synthetic Monitor (Ping/Browser/API)</text>
  <line x1="385" y1="215" x2="545" y2="215" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="200" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="220" text-anchor="middle" fill="#86EFAC" font-size="12">builtin:synthetic_test</text>

  <!-- Row 4: SLO -->
  <rect x="60" y="240" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="260" text-anchor="middle" fill="#94A3B8" font-size="12">SLO + SLI Query</text>
  <line x1="385" y1="255" x2="545" y2="255" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="240" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="260" text-anchor="middle" fill="#86EFAC" font-size="12">builtin:monitoring.slo</text>

  <!-- Row 5: Workload -->
  <rect x="60" y="280" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="300" text-anchor="middle" fill="#94A3B8" font-size="12">Workload (entity grouping)</text>
  <line x1="385" y1="295" x2="545" y2="295" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="280" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="300" text-anchor="middle" fill="#86EFAC" font-size="12">Segment + IAM Policy</text>

  <!-- Row 6: Tags -->
  <rect x="60" y="320" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="340" text-anchor="middle" fill="#94A3B8" font-size="12">Entity Tags / Auto-Tag Rules</text>
  <line x1="385" y1="335" x2="545" y2="335" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="320" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="340" text-anchor="middle" fill="#86EFAC" font-size="12">OpenPipeline Enrichment</text>

  <!-- Row 7: Notifications -->
  <rect x="60" y="360" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="380" text-anchor="middle" fill="#94A3B8" font-size="12">Notification Channels (Email/Slack/PD/...)</text>
  <line x1="385" y1="375" x2="545" y2="375" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="360" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="380" text-anchor="middle" fill="#86EFAC" font-size="12">Workflow Action Tasks</text>

  <!-- Row 8: Infra -->
  <rect x="60" y="400" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="220" y="420" text-anchor="middle" fill="#94A3B8" font-size="12">Infra / Log Rules / Drop Rules</text>
  <line x1="385" y1="415" x2="545" y2="415" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="550" y="400" width="320" height="30" rx="6" fill="#1E293B"/>
  <text x="710" y="420" text-anchor="middle" fill="#86EFAC" font-size="12">OpenPipeline Parse / Drop / Mask</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="465" y="470" text-anchor="middle" fill="#475569" font-size="11">See docs/COVERAGE.md for the full 19-section matrix (170+ surfaces)</text>
  <text x="465" y="488" text-anchor="middle" fill="#334155" font-size="10">Gen2 targets available via --legacy (see docs/gen2-only-capabilities.md)</text>
</svg>
