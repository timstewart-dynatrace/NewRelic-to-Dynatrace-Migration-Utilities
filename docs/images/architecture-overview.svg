<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">New Relic → Dynatrace Migration Architecture</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">v2.0.0 — Gen3 Default Pipeline with --legacy Gen2 Fallback</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- NR Export (left) -->
  <rect x="30" y="90" width="200" height="340" rx="12" fill="#1E293B" stroke="#1CE783" stroke-width="2"/>
  <text x="130" y="120" text-anchor="middle" fill="#1CE783" font-size="15" font-weight="700">New Relic</text>
  <text x="130" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">NerdGraph API Export</text>
  <line x1="50" y1="160" x2="210" y2="160" stroke="#334155" stroke-width="1"/>
  <text x="130" y="182" text-anchor="middle" fill="#94A3B8" font-size="11">Dashboards</text>
  <text x="130" y="200" text-anchor="middle" fill="#94A3B8" font-size="11">Alert Policies + Conditions</text>
  <text x="130" y="218" text-anchor="middle" fill="#94A3B8" font-size="11">Synthetic Monitors</text>
  <text x="130" y="236" text-anchor="middle" fill="#94A3B8" font-size="11">SLOs / Workloads</text>
  <text x="130" y="254" text-anchor="middle" fill="#94A3B8" font-size="11">Infrastructure / Logs</text>
  <text x="130" y="272" text-anchor="middle" fill="#94A3B8" font-size="11">Tags / Drop Rules</text>
  <text x="130" y="290" text-anchor="middle" fill="#94A3B8" font-size="11">Cloud (AWS/Azure/GCP)</text>
  <text x="130" y="308" text-anchor="middle" fill="#94A3B8" font-size="11">K8s / AIOps / Identity</text>
  <text x="130" y="326" text-anchor="middle" fill="#94A3B8" font-size="11">Lambda / RUM / Mobile</text>
  <text x="130" y="350" text-anchor="middle" fill="#94A3B8" font-size="11">+ 15 more surfaces</text>
  <text x="130" y="375" text-anchor="middle" fill="#73BE28" font-size="12" font-weight="700">40+ entity types</text>

  <!-- Arrow NR → Transform -->
  <line x1="235" y1="260" x2="300" y2="260" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Transform (center) -->
  <rect x="305" y="90" width="310" height="340" rx="12" fill="#1E293B" stroke="#1496FF" stroke-width="2"/>
  <text x="460" y="120" text-anchor="middle" fill="#1496FF" font-size="15" font-weight="700">Transform Engine</text>
  <text x="460" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">NRQL Compiler (292 patterns) + 40+ Transformers</text>
  <line x1="325" y1="160" x2="595" y2="160" stroke="#334155" stroke-width="1"/>

  <!-- Compiler pipeline -->
  <rect x="325" y="172" width="270" height="28" rx="6" fill="#334155"/>
  <text x="460" y="191" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="700">NRQL → Shorthands → Lexer → Parser → AST → Emitter → Uplift</text>

  <!-- Gen3 targets -->
  <text x="460" y="225" text-anchor="middle" fill="#73BE28" font-size="12" font-weight="700">Gen3 Default Targets</text>
  <text x="460" y="245" text-anchor="middle" fill="#86EFAC" font-size="11">Workflows + Davis Anomaly Detectors</text>
  <text x="460" y="261" text-anchor="middle" fill="#86EFAC" font-size="11">Segments + IAM Policies</text>
  <text x="460" y="277" text-anchor="middle" fill="#86EFAC" font-size="11">OpenPipeline Enrichment / Parse / Drop / Mask</text>
  <text x="460" y="293" text-anchor="middle" fill="#86EFAC" font-size="11">Document API Dashboards + Notebooks</text>
  <text x="460" y="309" text-anchor="middle" fill="#86EFAC" font-size="11">Settings 2.0 (SLOs, Synthetic, Cloud, K8s, ...)</text>

  <!-- Legacy fallback -->
  <rect x="325" y="325" width="270" height="45" rx="6" fill="#334155" stroke="#FFB800" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="460" y="345" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="700">--legacy Gen2 Fallback</text>
  <text x="460" y="362" text-anchor="middle" fill="#94A3B8" font-size="10">Alerting Profiles / MZs / Auto-Tags / Config v1</text>

  <!-- Validation badge -->
  <text x="460" y="400" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="700">1271 tests · 82% coverage · Hypothesis fuzz</text>

  <!-- Arrow Transform → DT -->
  <line x1="620" y1="260" x2="685" y2="260" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DT Import (right) -->
  <rect x="690" y="90" width="210" height="250" rx="12" fill="#1E293B" stroke="#1496FF" stroke-width="2"/>
  <text x="795" y="120" text-anchor="middle" fill="#1496FF" font-size="15" font-weight="700">Dynatrace</text>
  <text x="795" y="145" text-anchor="middle" fill="#94A3B8" font-size="11">Gen3 Platform APIs</text>
  <line x1="710" y1="160" x2="880" y2="160" stroke="#334155" stroke-width="1"/>
  <text x="795" y="182" text-anchor="middle" fill="#BFDBFE" font-size="11">Settings 2.0 API</text>
  <text x="795" y="200" text-anchor="middle" fill="#BFDBFE" font-size="11">Document API</text>
  <text x="795" y="218" text-anchor="middle" fill="#BFDBFE" font-size="11">Automation API (Workflows)</text>
  <text x="795" y="236" text-anchor="middle" fill="#BFDBFE" font-size="11">Events API</text>
  <text x="795" y="254" text-anchor="middle" fill="#BFDBFE" font-size="11">OAuth2 + Api-Token Auth</text>
  <text x="795" y="280" text-anchor="middle" fill="#94A3B8" font-size="10">Canary mode · Drift audit · Rollback</text>

  <!-- IaC Export (bottom right) -->
  <rect x="690" y="355" width="210" height="75" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="795" y="382" text-anchor="middle" fill="#A78BFA" font-size="14" font-weight="700">Config-as-Code</text>
  <text x="795" y="402" text-anchor="middle" fill="#DDD6FE" font-size="11">Monaco v2 YAML + Terraform HCL</text>
  <text x="795" y="418" text-anchor="middle" fill="#94A3B8" font-size="10">Gen3 resources (--legacy for Gen2)</text>

  <!-- Arrow Transform → IaC -->
  <line x1="615" y1="380" x2="685" y2="390" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="465" y="470" text-anchor="middle" fill="#475569" font-size="11">Dynatrace-NewRelic v2.0.0 · 53/53 nrql-engine parity · 15 skills referenced</text>
  <text x="465" y="488" text-anchor="middle" fill="#334155" font-size="10">github.com/timstewart-dynatrace/Dynatrace-NewRelic</text>
</svg>
