<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <!-- Title -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Migration Pipeline</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Export → Transform → Import (Gen3 Default)</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Phase 1: Export -->
  <rect x="30" y="100" width="240" height="120" rx="12" fill="#1E293B" stroke="#1CE783" stroke-width="2"/>
  <text x="150" y="130" text-anchor="middle" fill="#1CE783" font-size="15" font-weight="700">1. Export</text>
  <text x="150" y="155" text-anchor="middle" fill="#94A3B8" font-size="11">NerdGraph GraphQL</text>
  <text x="150" y="175" text-anchor="middle" fill="#94A3B8" font-size="11">Rate-limited + paginated</text>
  <text x="150" y="195" text-anchor="middle" fill="#94A3B8" font-size="11">Incremental (hash-based skip)</text>

  <line x1="275" y1="160" x2="340" y2="160" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Transform -->
  <rect x="345" y="85" width="240" height="155" rx="12" fill="#1E293B" stroke="#1496FF" stroke-width="2"/>
  <text x="465" y="115" text-anchor="middle" fill="#1496FF" font-size="15" font-weight="700">2. Transform</text>
  <text x="465" y="140" text-anchor="middle" fill="#A78BFA" font-size="11">NRQL → DQL Compiler</text>
  <text x="465" y="158" text-anchor="middle" fill="#94A3B8" font-size="11">292 patterns · Phase 19 uplift</text>
  <text x="465" y="178" text-anchor="middle" fill="#94A3B8" font-size="11">40+ transformers → Gen3 envelopes</text>
  <text x="465" y="196" text-anchor="middle" fill="#94A3B8" font-size="11">MetricTransform plugin hook</text>
  <text x="465" y="216" text-anchor="middle" fill="#94A3B8" font-size="11">DQL Validator + 24 auto-fixers</text>

  <line x1="590" y1="160" x2="655" y2="160" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Import -->
  <rect x="660" y="100" width="240" height="120" rx="12" fill="#1E293B" stroke="#73BE28" stroke-width="2"/>
  <text x="780" y="130" text-anchor="middle" fill="#73BE28" font-size="15" font-weight="700">3. Import</text>
  <text x="780" y="155" text-anchor="middle" fill="#94A3B8" font-size="11">Settings 2.0 + Document + Automation</text>
  <text x="780" y="175" text-anchor="middle" fill="#94A3B8" font-size="11">OAuth2 + Api-Token auth</text>
  <text x="780" y="195" text-anchor="middle" fill="#94A3B8" font-size="11">Canary mode (--canary 20)</text>

  <!-- Phase 3b: Config-as-Code Export -->
  <line x1="465" y1="245" x2="465" y2="280" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="315" y="285" width="300" height="70" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="465" y="312" text-anchor="middle" fill="#A78BFA" font-size="14" font-weight="700">Config-as-Code Export</text>
  <text x="465" y="335" text-anchor="middle" fill="#DDD6FE" font-size="11">Monaco v2 YAML · Terraform HCL · Gen3 resources</text>

  <!-- Safety layer -->
  <rect x="100" y="385" width="730" height="60" rx="12" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="465" y="410" text-anchor="middle" fill="#22D3EE" font-size="13" font-weight="700">Safety Layer</text>
  <text x="465" y="430" text-anchor="middle" fill="#A5F3FC" font-size="11">--dry-run · --diff · --rollback · --canary · migrate.py audit · migrate.py preflight</text>

  <!-- Footer -->
  <text x="465" y="475" text-anchor="middle" fill="#475569" font-size="10">Dynatrace-NewRelic v2.0.0 · docs/COVERAGE.md for per-surface status</text>
</svg>
